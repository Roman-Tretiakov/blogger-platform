tags:
  - name: SecurityDevices
    description: API for managing auth device sessions

paths:
  /api/security/devices:
    get:
      summary: Returns all devices with active sessions for current user
      tags:
        - SecurityDevices
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceViewModel'
        '401':
          description: Unauthorized
      security:
        - bearerAuth: []
    delete:
      summary: Terminate all other (exclude current) device's sessions
      tags:
        - SecurityDevices
      responses:
        '204':
          description: No Content (All other sessions terminated)
        '401':
          description: Unauthorized
      security:
        - bearerAuth: []
  /security/devices/{deviceId}:
    delete:
      summary: Terminate specified device session
      tags:
        - SecurityDevices
      parameters:
        - name: deviceId
          in: path
          required: true
          description: ID of the device session to terminate
          schema:
            type: string
          example: "device-123-abc"
      responses:
        '204':
          description: No Content (Session terminated)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Attempt to terminate someone else's device)
        '404':
          description: Not Found (Device not found)
      security:
        - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Enter JWT Bearer token"
  schemas:
    DeviceViewModel:
      type: array
      items:
        type: object
        required:
          - ip
          - title
          - lastActiveDate
          - deviceId
        properties:
          ip:
            type: string
            description: IP address of the device
            example: "192.168.1.1"
          title:
            type: string
            description: Device title/browser name
            example: "Chrome 120.0"
          lastActiveDate:
            type: string
            description: Last activity date in ISO format
            example: "2024-03-20T10:30:00.000Z"
          deviceId:
            type: string
            description: Unique device identifier
            example: "device-123-abc"